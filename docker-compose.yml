name: driftguard

# Full four-zone stack: serving API, Kafka (ingestion bus), MLflow (registry),
# Prometheus (monitoring). The app is offline-first, so these back the production
# adapters (LOGSHIELD_* / DRIFTGUARD_* env vars switch them on).

services:
  serving:
    build: .
    environment:
      DRIFTGUARD_BUS: kafka
      KAFKA_BROKERS: kafka:9092
      DRIFTGUARD_REGISTRY: mlflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports: ["8000:8000"]
    depends_on: [kafka, mlflow]

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]
    depends_on: [zookeeper]

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports: ["5000:5000"]
    volumes: ["mlflow-data:/mlflow"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

volumes:
  mlflow-data:
