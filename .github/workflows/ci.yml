name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve,dev]"
      - name: Lint
        run: ruff check driftguard scripts
      - name: Tests
        run: pytest --cov=driftguard --cov-report=term-missing
      - name: CLI smoke test
        run: |
          driftguard --version
          driftguard --rows 1500 demo

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build serving image
        run: docker build -t driftguard:ci .
